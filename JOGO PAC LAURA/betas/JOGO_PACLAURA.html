<!DOCTYPE html>
<html>
<head>
	<title>PAC-LAURA</title>
	<link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Permanent+Marker">
	<style type="text/css">
		body {
			/* Fundo do Menu Inicial */
			background-image: url('foto_de_fundo.jpg'); 
			background-size: cover;
			background-position: center center;
			background-repeat: no-repeat;
			width: auto;
			margin: 0;
			font-family: sans-serif;
			text-align: center;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
		}
        #game-wrapper {
            background-color: rgba(0, 0, 0, 0.5); /* Sombra para o menu */
            padding: 20px;
            border-radius: 15px;
        }
        #game-container { 
            display: none; 
            /* O fundo do jogo em si é controlado pelo JS */
            padding: 20px;
            border-radius: 10px;
        }
		#pacman { 
            height: auto;
            width: 90vw;
            max-width: 760px; /* Jogo maior */
            border-radius: 5px; 
            margin: 0 auto;
        }
		#shim { font-family: 'Permanent Marker', cursive; position: absolute; visibility: hidden; }
		h1 { font-family: 'Permanent Marker', cursive; text-align: center; font-size: 40px; color: yellow; text-shadow: 2px 2px 4px #000; }
		p { text-align: center; color: white; font-size: 16px; max-width: 400px; margin: 10px auto; text-shadow: 1px 1px 3px #000; }
        
        #start-menu { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        #start-menu img { max-width: 90%; max-width: 400px; margin-bottom: 20px; }
        #start-menu button { font-family: 'Permanent Marker', cursive; font-size: 24px; color: black; background-color: yellow; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; transition: transform 0.2s; }
        #start-menu button:hover { transform: scale(1.1); }
	</style>
</head>
<body>
    <div id="game-wrapper">
        <div id="start-menu">
            <img src="logo.png" alt="Logo PAC-LAURA">
            <p>
                A ideia é simples: você terá 3 vidas para sobreviver a 3 fases e fugir dos fantasmas de Leonardo. Se você vencer, a gente continua junto ;)
            </p>
            <br>
            <button onclick="startGame()">Começar Jogo</button>
        </div>

        <div id="game-container">
            <div id="pacman"></div>
        </div>
    </div>

	<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"></script>
	<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>

function startGame() {
    // Fundo do jogo com os gatinhos
    document.body.style.backgroundImage = "url('gatinhos_fundo.jpg')";
    document.body.style.backgroundSize = "auto";
    document.body.style.backgroundRepeat = "repeat";
    document.body.style.backgroundColor = "black"; 

    document.getElementById('game-wrapper').style.backgroundColor = 'transparent';
    document.getElementById('start-menu').style.display = 'none';
    document.getElementById('game-container').style.display = 'block';
    
    if (Modernizr.canvas && Modernizr.localstorage) {
        PACMAN.init(document.getElementById("pacman"), "");
    } else {
        document.getElementById("pacman").innerHTML = "Desculpe, seu navegador não suporta o jogo.";
    }
}
