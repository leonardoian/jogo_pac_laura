<!DOCTYPE html>
<html>
<head>
	<title>PAC-LAURA</title>
	<link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Permanent+Marker">
	<style type="text/css">
		body {
			background-image: url('imagens/foto_de_fundo.jpg');
			background-size: cover;
			background-position: center center;
			background-repeat: no-repeat;
			width: auto;
			margin: 0;
			font-family: sans-serif;
			text-align: center;
			height: 100vh;
			display: flex;
			justify-content: flex-end;
			align-items: center;
			padding-right: 10vw;
			box-sizing: border-box;
		}

		#game-wrapper {
			background-color: rgba(0, 0, 0, 0.5);
			padding: 20px;
			border-radius: 15px;
		}

		#game-container {
			display: none;
			background-color: #FFC0CB; /* Fundo rosa ao redor do canvas */
			padding: 10px;
			border-radius: 10px;
		}

		#pacman {
			height: auto;
			width: 90vw;
			max-width: 760px;
			border-radius: 5px;
			margin: 0 auto;
		}

		#shim {
			font-family: 'Permanent Marker', cursive;
			position: absolute;
			visibility: hidden;
		}

		h1 {
			font-family: 'Permanent Marker', cursive;
			text-align: center;
			font-size: 40px;
			color: yellow;
			text-shadow: 2px 2px 4px #000;
		}

		p {
			text-align: center;
			color: white;
			font-size: 20px;
			max-width: 400px;
			margin: 10px auto;
			text-shadow: 1px 1px 3px #000;
		}

		#start-menu {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
		}

		#start-menu img {
			max-width: 90%;
			max-width: 500px;
			margin-bottom: 20px;
		}

		#start-menu button {
			font-family: 'Permanent Marker', cursive;
			font-size: 24px;
			color: black;
			background-color: yellow;
			border: none;
			padding: 15px 30px;
			border-radius: 10px;
			cursor: pointer;
			transition: transform 0.2s;
		}

		#start-menu button:hover {
			transform: scale(1.1);
		}
	</style>
</head>

		function tryPlayMusic() {
			var playPromise = menuMusic.play();
			if (playPromise !== undefined) {
				playPromise.then(_ => {
					// Autoplay funcionou!
					console.log("Música do menu iniciada.");
					// Remove o listener de clique se não for mais necessário
					document.body.removeEventListener('click', tryPlayMusicOnClick);
				}).catch(error => {
					// Autoplay foi bloqueado. Precisa de clique.
					console.log("Autoplay bloqueado. Clique na página para iniciar a música.");

					document.body.addEventListener('click', tryPlayMusicOnClick, { once: true });

		};

		Pacman.Audio = function(game) {
